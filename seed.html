function initDB() {
  const cfg = window.FIREBASE_CONFIG;
  if (!cfg || cfg.apiKey === 'VOTRE_API_KEY') return null;
  if (!firebase.apps.length) firebase.initializeApp(cfg);
  return firebase.firestore();
}

function ref() {
  return 'MWH-' + Date.now().toString(36).toUpperCase().slice(-5)
       + Math.random().toString(36).slice(2,5).toUpperCase();
}

function daysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString();
}

async function seedProviders() {
  const btn = document.getElementById('btn-p');
  const log = document.getElementById('log-p');
  btn.disabled = true; btn.textContent = 'Ajout en cours…'; log.innerHTML = '';
  const db = initDB();
  if (!db) { log.innerHTML = '<span class="err">❌ Firebase non configuré.</span>'; btn.disabled=false; return; }
  let ok=0, err=0;
  for (const p of providers) {
    try {
      await db.collection('providers').add({ ...p, rvl:[], createdAt:firebase.firestore.FieldValue.serverTimestamp(), updatedAt:firebase.firestore.FieldValue.serverTimestamp() });
      log.innerHTML += `<span class="ok">✓ ${p.name} (${p.cat})</span><br>`; ok++;
    } catch(e) { log.innerHTML += `<span class="err">❌ ${p.name} — ${e.message}</span><br>`; err++; }
  }
  log.innerHTML += `<br><strong>${ok} prestataires ajoutés${err?', '+err+' erreurs':''}.</strong>`;
  btn.textContent = 'Terminé ✓';
}

async function seedDemandes() {
  const btn = document.getElementById('btn-d');
  const log = document.getElementById('log-d');
  btn.disabled = true; btn.textContent = 'Ajout en cours…'; log.innerHTML = '';
  const db = initDB();
  if (!db) { log.innerHTML = '<span class="err">❌ Firebase non configuré.</span>'; btn.disabled=false; return; }

  let ok=0, err=0;
  for (const d of demandes) {
    const { ago, ...data } = d;
    const payload = {
      ...data,
      type: 'service_request',
      ref: ref(),
      source: 'seed',
      createdAt: firebase.firestore.Timestamp.fromDate(new Date(daysAgo(ago))),
    };
    try {
      await db.collection('demandes').add(payload);
      log.innerHTML += `<span class="ok">✓ ${d.nom} — ${d.serviceType}</span><br>`; ok++;
    } catch(e) { log.innerHTML += `<span class="err">❌ ${d.nom} — ${e.message}</span><br>`; err++; }
  }
  log.innerHTML += `<br><strong>${ok} demandes ajoutées${err?', '+err+' erreurs':''}.</strong>`;
  btn.textContent = 'Terminé ✓';
}
